<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Reset Password — Extra2Essential</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#faf7f2;display:flex;align-items:center;justify-content:center;min-height:100vh}
    .box{background:#fff;border-radius:20px;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 8px 30px rgba(0,0,0,0.08)}
    h1{font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;color:#141a12;margin-bottom:0.4rem}
    p{color:#7a8c73;font-size:0.95rem;margin-bottom:1.5rem}
    label{display:block;font-size:0.83rem;font-weight:600;color:#3a4a35;margin-bottom:0.4rem}
    input{width:100%;padding:0.82rem 1rem;border:1.5px solid #e2ede8;border-radius:10px;font-size:0.92rem;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:1rem;transition:border-color 0.2s}
    input:focus{border-color:#1a7c4f}
    button{width:100%;padding:0.9rem;background:#1a7c4f;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
    button:hover{background:#22a86a}
    .msg{padding:0.75rem 1rem;border-radius:8px;font-size:0.88rem;margin-bottom:1rem;display:none}
    .msg.show{display:block}
    .success{background:#e8f7ef;color:#1a7c4f;border:1px solid rgba(26,124,79,0.2)}
    .error{background:#fff5f5;color:#e53e3e;border:1px solid #fed7d7}
  </style>
</head>
<body>
<div class="box">
  <h1>Reset Password 🔐</h1>
  <p>Enter your new password below</p>
  <div class="msg success" id="successMsg"></div>
  <div class="msg error" id="errorMsg"></div>
  <label>New Password</label>
  <input type="password" id="password" placeholder="Min 8 characters"/>
  <label>Confirm Password</label>
  <input type="password" id="confirm" placeholder="Repeat password"/>
  <button onclick="resetPassword()">Reset Password →</button>
</div>
<div style="position:relative">
  <input type="password" id="password" placeholder="Min 8 characters" style="padding-right:2.8rem;margin-bottom:0"/>
  <span onclick="togglePassword('password', this)"
    style="position:absolute;right:0.9rem;top:50%;transform:translateY(-50%);cursor:pointer;font-size:1.1rem;user-select:none">
    👁️
  </span>
</div>
<script>
  const token = new URLSearchParams(window.location.search).get('token');
  if (!token) document.querySelector('p').textContent = 'Invalid reset link.';

  async function resetPassword() {
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;
    const s = document.getElementById('successMsg');
    const e = document.getElementById('errorMsg');
    s.classList.remove('show'); e.classList.remove('show');

    if (!password || password !== confirm) {
      e.textContent = 'Passwords do not match.'; e.classList.add('show'); return;
    }
    if (password.length < 6) {
      e.textContent = 'Password too short.'; e.classList.add('show'); return;
    }
    const res = await fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ token, password })
    });
    const text = await res.text();
    if (res.ok) {
      s.textContent = '✅ ' + text + ' Redirecting to login...';
      s.classList.add('show');
      setTimeout(() => window.location.href = 'login.html', 2000);
    } else {
      e.textContent = text; e.classList.add('show');
    }
  }
</script>
</body>
</html>
